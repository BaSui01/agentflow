# =============================================================================
# 📦 AgentFlow 示例配置文件
# =============================================================================
# 复制此文件为 config.yaml 并根据需要修改
# 配置优先级: 默认值 → YAML 文件 → 环境变量
# =============================================================================

# -----------------------------------------------------------------------------
# 🖥️ 服务器配置
# -----------------------------------------------------------------------------
server:
  # HTTP API 端口
  http_port: 8080
  # gRPC 服务端口
  grpc_port: 9090
  # Prometheus 指标端口
  metrics_port: 9091
  # 读取超时
  read_timeout: "30s"
  # 写入超时
  write_timeout: "30s"
  # 优雅关闭超时
  shutdown_timeout: "15s"

# -----------------------------------------------------------------------------
# 🤖 Agent 默认配置
# -----------------------------------------------------------------------------
agent:
  # Agent 名称
  name: "default-agent"
  # Agent 描述
  description: "Default AgentFlow agent"
  # 使用的模型
  model: "gpt-4"
  # 系统提示词
  system_prompt: "You are a helpful AI assistant."
  # 最大迭代次数
  max_iterations: 10
  # 温度参数 (0.0 - 2.0)
  temperature: 0.7
  # 最大 Token 数
  max_tokens: 4096
  # 超时时间
  timeout: "5m"
  # 是否启用流式输出
  stream_enabled: true

  # 记忆配置
  memory:
    # 是否启用记忆
    enabled: true
    # 记忆类型: buffer, summary, vector
    type: "buffer"
    # 最大消息数
    max_messages: 100
    # Token 限制
    token_limit: 8000

# -----------------------------------------------------------------------------
# 🔴 Redis 配置 (短期记忆缓存)
# -----------------------------------------------------------------------------
redis:
  # Redis 地址
  addr: "localhost:6379"
  # 密码 (留空表示无密码)
  password: ""
  # 数据库编号
  db: 0
  # 连接池大小
  pool_size: 10
  # 最小空闲连接
  min_idle_conns: 2

# -----------------------------------------------------------------------------
# 🐘 数据库配置 (元数据存储)
# -----------------------------------------------------------------------------
database:
  # 驱动类型: postgres, mysql, sqlite
  driver: "postgres"
  # 主机地址
  host: "localhost"
  # 端口
  port: 5432
  # 用户名
  user: "agentflow"
  # 密码
  password: "your_password_here"
  # 数据库名
  name: "agentflow"
  # SSL 模式: disable, require, verify-ca, verify-full
  ssl_mode: "disable"
  # 最大连接数
  max_open_conns: 25
  # 最大空闲连接
  max_idle_conns: 5
  # 连接最大生命周期
  conn_max_lifetime: "5m"

# -----------------------------------------------------------------------------
# 🔷 Qdrant 配置 (向量存储)
# -----------------------------------------------------------------------------
qdrant:
  # Qdrant 主机
  host: "localhost"
  # gRPC 端口
  port: 6334
  # API Key (可选)
  api_key: ""
  # 默认集合名
  collection: "agentflow_vectors"

# -----------------------------------------------------------------------------
# 🧠 LLM 配置
# -----------------------------------------------------------------------------
llm:
  # 默认 Provider: openai, anthropic, azure, ollama
  default_provider: "openai"
  # API Key (建议使用环境变量 AGENTFLOW_LLM_API_KEY)
  api_key: ""
  # 基础 URL (可选，用于自定义端点)
  base_url: ""
  # 请求超时
  timeout: "2m"
  # 最大重试次数
  max_retries: 3

# -----------------------------------------------------------------------------
# 🎬 多模态框架能力配置
# -----------------------------------------------------------------------------
multimodal:
  # 是否启用 /api/v1/multimodal/* 路由
  enabled: true
  # 参考图上传大小限制（字节）
  reference_max_size_bytes: 8388608
  # 参考图缓存 TTL
  reference_ttl: "2h"
  # 参考图存储后端：仅支持 redis
  reference_store_backend: "redis"
  # Redis key 前缀
  # 安全说明：非本机地址请使用 redis.addr=rediss://host:port
  reference_store_key_prefix: "agentflow:mm:ref"
  # 默认提供商（为空表示按已配置 provider 自动选择）
  default_image_provider: ""
  default_video_provider: ""

  image:
    # 建议优先使用环境变量 AGENTFLOW_MULTIMODAL_IMAGE_OPENAI_API_KEY
    openai_api_key: ""
    openai_base_url: ""
    # 建议优先使用环境变量 AGENTFLOW_MULTIMODAL_IMAGE_GEMINI_API_KEY
    gemini_api_key: ""

  video:
    # 建议优先使用环境变量 AGENTFLOW_MULTIMODAL_VIDEO_RUNWAY_API_KEY
    runway_api_key: ""
    # 建议优先使用环境变量 AGENTFLOW_MULTIMODAL_VIDEO_VEO_API_KEY
    veo_api_key: ""
    # Google API Key（用于 Veo/Gemini 视频链路）
    # 建议优先使用环境变量 AGENTFLOW_MULTIMODAL_VIDEO_GOOGLE_API_KEY
    google_api_key: ""

# -----------------------------------------------------------------------------
# 📝 日志配置
# -----------------------------------------------------------------------------
log:
  # 日志级别: debug, info, warn, error
  level: "info"
  # 输出格式: json, console
  format: "json"
  # 输出路径
  output_paths:
    - "stdout"
    # - "/var/log/agentflow/app.log"
  # 是否启用调用者信息
  enable_caller: true
  # 是否启用堆栈跟踪
  enable_stacktrace: false

# -----------------------------------------------------------------------------
# 📊 遥测配置
# -----------------------------------------------------------------------------
telemetry:
  # 是否启用遥测
  enabled: false
  # OTLP 端点
  otlp_endpoint: "localhost:4317"
  # 服务名称
  service_name: "agentflow"
  # 采样率 (0.0 - 1.0)
  sample_rate: 0.1

# -----------------------------------------------------------------------------
# 🔧 工具提供者配置
# -----------------------------------------------------------------------------
tools:
  # Tavily 搜索 (https://tavily.com)
  tavily:
    # API Key (建议使用环境变量 AGENTFLOW_TOOLS_TAVILY_API_KEY)
    api_key: ""
    # 基础 URL (可选)
    base_url: "https://api.tavily.com"
    # 请求超时
    timeout: "15s"

  # Jina Reader 网页抓取 (https://jina.ai/reader)
  jina:
    # API Key (建议使用环境变量 AGENTFLOW_TOOLS_JINA_API_KEY)
    api_key: ""
    # 基础 URL (可选)
    base_url: "https://r.jina.ai"
    # 请求超时
    timeout: "30s"

  # Firecrawl 搜索+抓取 (https://firecrawl.dev)
  firecrawl:
    # API Key (建议使用环境变量 AGENTFLOW_TOOLS_FIRECRAWL_API_KEY)
    api_key: ""
    # 基础 URL (可选)
    base_url: "https://api.firecrawl.dev"
    # 请求超时
    timeout: "30s"

  # DuckDuckGo 搜索 (完全免费，无需 API Key)
  duckduckgo:
    timeout: "15s"

  # SearXNG 自托管元搜索引擎 (无需 API Key，需自行部署)
  # 公共实例列表: https://searx.space/
  searxng:
    # SearXNG 实例地址 (必填)
    base_url: ""
    timeout: "15s"

  # 纯 HTTP 网页抓取 (零依赖，无需 API Key，不支持 JS 渲染)
  http_scrape:
    user_agent: "Mozilla/5.0 (compatible; AgentFlow/1.0)"
    timeout: "30s"
