replicaCount: 3

server:
  environment: production
  allowNoAuth: false
  metricsBindAddress: 0.0.0.0

agent:
  model: gpt-4o

service:
  type: ClusterIP

metrics:
  service:
    enabled: true

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: agentflow.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: agentflow-tls
      hosts:
        - agentflow.example.com

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

secrets:
  existingSecret: agentflow-secrets

