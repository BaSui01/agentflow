version: 3
workdir: .

allow:
  depOnAnyVendor: true
  ignoreNotFoundComponents: true

exclude:
  - agent
  - api
  - cmd
  - config
  - internal
  - llm
  - pkg
  - rag
  - workflow
  - testutil
  - scripts
  - examples
  - .snow

excludeFiles:
  - '^.*_test\.go$'
  - '^.*[\\/]examples[\\/].*$'
  - '^.*[\\/]\.snow[\\/].*$'
  - '^.*[\\/]agentflow\.go$'

components:
  types:
    in:
      - types

deps:
  types:
    mayDependOn:
      - types
