# =============================================================================
# 🔍 AgentFlow golangci-lint 配置
# =============================================================================
# 全面的代码质量检查配置，覆盖错误处理、代码风格、安全性等多个维度
# 文档: https://golangci-lint.run/usage/configuration/
# =============================================================================

run:
  timeout: 5m
  # 跳过测试文件中的某些检查（可选）
  tests: true
  # 并发数
  concurrency: 4

# -----------------------------------------------------------------------------
# Linters 配置
# -----------------------------------------------------------------------------
linters:
  disable-all: true
  enable:
    # ========== 核心检查器 (必须) ==========
    - govet          # Go 官方静态分析工具，检查可疑代码结构
    - staticcheck    # 高级静态分析，检查 bug、性能问题、代码简化
    - errcheck       # 🆕 检查未处理的错误返回值（超级重要！）
    - gosimple       # 🆕 代码简化建议
    - ineffassign    # 🆕 检测无效赋值
    - unused         # 🆕 检测未使用的代码
    - typecheck      # 类型检查

    # ========== 代码风格 ==========
    - gocritic       # 🆕 代码风格和性能检查
    - gofmt          # 格式化检查
    - goimports      # import 排序检查
    - misspell       # 🆕 拼写检查

    # ========== 安全性 ==========
    - gosec          # 🆕 安全漏洞检查（SQL注入、硬编码密钥等）

    # ========== 代码复杂度 ==========
    - gocyclo        # 🆕 圈复杂度检查
    - gocognit       # 🆕 认知复杂度检查

    # ========== 最佳实践 ==========
    - nolintlint     # 🆕 检查 nolint 指令的规范性
    - copyloopvar    # Go 1.22+ 用于检查循环变量复制场景
    - prealloc       # 🆕 建议预分配切片容量
    - unconvert      # 🆕 检测不必要的类型转换
    - unparam        # 🆕 检测未使用的函数参数
    - nakedret       # 🆕 检查裸返回语句
    - bodyclose      # 🆕 检查 HTTP response body 是否关闭

# -----------------------------------------------------------------------------
# Linters 详细设置
# -----------------------------------------------------------------------------
linters-settings:
  # 圈复杂度阈值（超过此值会警告）
  gocyclo:
    min-complexity: 15

  # 认知复杂度阈值
  gocognit:
    min-complexity: 20

  # gocritic 检查器配置
  gocritic:
    enabled-tags:
      - diagnostic    # 诊断类检查
      - style         # 风格类检查
      - performance   # 性能类检查
    disabled-checks:
      - ifElseChain   # 允许 if-else 链（有时比 switch 更清晰）
      - hugeParam     # 大参数检查（某些场景需要）

  # gosec 安全检查配置
  gosec:
    excludes:
      - G104  # 审计未检查的错误（errcheck 已覆盖）
    config:
      global:
        audit: enabled

  # errcheck 配置
  errcheck:
    check-type-assertions: true  # 检查类型断言
    check-blank: true            # 检查 _ = err 的情况

  # misspell 配置
  misspell:
    locale: US

  # nakedret 配置（函数体超过此行数禁止裸返回）
  nakedret:
    max-func-lines: 30

  # govet 配置
  govet:
    enable-all: true
    disable:
      - fieldalignment  # 字段对齐检查（有时会影响可读性）

# -----------------------------------------------------------------------------
# 问题过滤和排除
# -----------------------------------------------------------------------------
issues:
  # 排除规则
  exclude-rules:
    # 测试文件中允许一些宽松的规则
    - path: _test\.go
      linters:
        - errcheck      # 测试中有时故意忽略错误
        - gosec         # 测试中可能有硬编码的测试数据
        - gocyclo       # 测试函数可能较复杂
        - gocognit      # 测试函数可能较复杂
        - unparam       # 测试中可能有未使用的参数

    # 示例文件中允许宽松规则
    - path: example_
      linters:
        - errcheck
        - unused

    # 生成的代码排除
    - path: \.pb\.go$
      linters:
        - all

    # mock 文件排除
    - path: mock_
      linters:
        - all

  # 最大同类问题数（0 = 无限制）
  max-same-issues: 0

  # 最大问题数（0 = 无限制）
  max-issues-per-linter: 0

  # 显示新问题（相对于基准）
  new: false

# -----------------------------------------------------------------------------
# 输出配置
# -----------------------------------------------------------------------------
output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

# -----------------------------------------------------------------------------
# 严重性配置
# -----------------------------------------------------------------------------
severity:
  default-severity: warning
  rules:
    - linters:
        - errcheck
        - gosec
      severity: error
