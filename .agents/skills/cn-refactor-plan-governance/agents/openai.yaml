interface:
  display_name: "重构计划：诊断·执行·治理"
  short_description: "Diagnose codebase architecture issues, generate Chinese refactoring plans with TDD checklists, execute uncompleted tasks by modifying code and running verification, govern plans via lint/report/gate/archive."
  default_prompt: "First determine the mode from user intent: Diagnostic (分析/扫描/生成计划), Execution (执行/推进/按计划改), or Governance (审核/归档). Diagnostic: scan directory structure, layer dependencies, duplicated semantics, large files, public surface divergence → classify P0-P3 → generate plan to docs/重构计划/. Execution: scan active plans → prioritize unchecked items → read code → modify (single-track, no compat shims) → verify → update plan → report. Governance: run lint/report/gate/audit_plan.py. Always follow CLAUDE.md architecture constraints."
